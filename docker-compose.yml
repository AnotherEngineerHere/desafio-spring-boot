services:
  task-management-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: nuevospa/task-management:latest
    container_name: task-management-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - APP_JWT_SECRET=${APP_JWT_SECRET:-NuevoSPATaskManagementSecretKey2025SuperSecureBase64EncodedKey==}
      - APP_JWT_EXPIRATION=${APP_JWT_EXPIRATION:-86400000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api-docs > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
