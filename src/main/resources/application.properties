# ============================================================
# NUEVO SPA - Task Management API
# Application Configuration
# ============================================================

# Server
server.port=8080

# ============================================================
# H2 Database
# ============================================================
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=NuevoSPATaskManagementSecretKey2025SuperSecureBase64EncodedKey==
app.jwt.expiration=86400000

# ============================================================
# SpringDoc / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/openapi.yml
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ============================================================
# Logging
# ============================================================
logging.level.com.nuevospa=DEBUG
logging.level.org.springframework.security=INFO
